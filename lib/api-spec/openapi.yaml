openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GTM Intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: icps
    description: Ideal Customer Profiles
  - name: signals
    description: Automated ICP signal radar
  - name: dashboard
    description: Dashboard summaries
  - name: account-brief
    description: AI-powered account brief generation
  - name: your-company
    description: Seller profile reasoning and prompt preview

paths:
  /account-brief:
    post:
      operationId: generateAccountBrief
      tags: [account-brief]
      summary: Generate an AI-powered account brief for a company URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountBriefInput"
      responses:
        "200":
          description: Generated account brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBrief"

  /account-brief/cold-email:
    post:
      operationId: regenerateColdEmail
      tags: [account-brief]
      summary: Regenerate cold email with a different tone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColdEmailRegenerateInput"
      responses:
        "200":
          description: Regenerated cold email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBriefColdEmail"

  /account-brief/talk-track:
    post:
      operationId: generateTalkTrack
      tags: [account-brief]
      summary: Generate discovery call talk track from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalkTrackInput"
      responses:
        "200":
          description: Generated talk track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalkTrack"

  /account-brief/prep:
    post:
      operationId: generateCallPrep
      tags: [account-brief]
      summary: Generate a 1-page pre-call briefing card from an existing brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallPrepInput"
      responses:
        "200":
          description: Generated call prep card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallPrep"

  /account-map:
    post:
      operationId: generateAccountMap
      tags: [account-brief]
      summary: Map a global enterprise structure by geographic region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountMapRequest"
      responses:
        "200":
          description: Enterprise account map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountMapResponse"
        "400":
          description: Invalid request

  /next-touch:
    post:
      operationId: generateNextTouch
      tags: [account-brief]
      summary: Generate a next-touch opener from a prospect reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextTouchInput"
      responses:
        "200":
          description: Generated next-touch opener and coaching suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextTouchResponse"

  /your-company/sector-packs:
    get:
      operationId: listSectorPacks
      tags: [your-company]
      summary: List available sector reasoning packs
      responses:
        "200":
          description: Sector pack catalogue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorPackListResponse"

  /your-company/preview-prompt:
    post:
      operationId: previewAccountBriefPrompt
      tags: [your-company]
      summary: Preview the composed account brief system prompt for a seller profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewPromptInput"
      responses:
        "200":
          description: Composed system prompt and sector pack detection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewPromptResponse"

  /market-prospect:
    post:
      operationId: prospectMarket
      tags: [account-brief]
      summary: Find matching companies for a target market description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketProspectInput"
      responses:
        "200":
          description: Matching prospect companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketProspectResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /icps:
    get:
      operationId: listIcps
      tags: [icps]
      summary: List all ICPs
      responses:
        "200":
          description: List of ICPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Icp"
    post:
      operationId: createIcp
      tags: [icps]
      summary: Create an ICP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpInput"
      responses:
        "201":
          description: Created ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"

  /icps/{id}:
    get:
      operationId: getIcp
      tags: [icps]
      summary: Get ICP by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
        "404":
          description: Not found
    patch:
      operationId: updateIcp
      tags: [icps]
      summary: Update ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpUpdate"
      responses:
        "200":
          description: Updated ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
    delete:
      operationId: deleteIcp
      tags: [icps]
      summary: Delete ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List radar signals
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /signal-radar:
    post:
      operationId: runSignalRadar
      tags: [signals]
      summary: Scan the web for ICP-matching buying signals
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalScanInput"
      responses:
        "200":
          description: Newly discovered signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalScanResponse"
        "400":
          description: No ICPs defined or invalid request

  /signals/scan:
    post:
      operationId: scanAccountSignals
      tags: [signals]
      summary: Scan a researched account for Tier 1 and Tier 2 buying signals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanAccountSignalsInput"
      responses:
        "200":
          description: Up to five account signals from the last 90 days
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanAccountSignalsResponse"
        "400":
          description: Invalid request

  /signal-opener:
    post:
      operationId: generateSignalOpener
      tags: [signals]
      summary: Draft a cold email opener anchored on a buying signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalOpenerInput"
      responses:
        "200":
          description: Generated opener
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalOpenerResponse"
        "400":
          description: Invalid request

  /signals/{id}:
    patch:
      operationId: updateSignal
      tags: [signals]
      summary: Update signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalUpdate"
      responses:
        "200":
          description: Updated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
    delete:
      operationId: deleteSignal
      tags: [signals]
      summary: Delete signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required:
        - icpCount
        - unreadSignalCount
        - recentSignals
      properties:
        icpCount:
          type: integer
        unreadSignalCount:
          type: integer
        recentSignals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"

    Icp:
      type: object
      required:
        - id
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    IcpInput:
      type: object
      required:
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    IcpUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    Signal:
      type: object
      required:
        - id
        - title
        - type
        - source
        - importance
        - reviewed
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        companyName:
          type: ["string", "null"]
        companyDomain:
          type: ["string", "null"]
        icpName:
          type: ["string", "null"]
        icpId:
          type: ["integer", "null"]
        reviewed:
          type: boolean
        createdAt:
          type: string

    SignalScanInput:
      type: object
      properties:
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    SignalScanResponse:
      type: object
      required:
        - signals
        - added
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        added:
          type: integer

    AccountSignalType:
      type: string
      description: Tier 1 and Tier 2 buying signal categories for account scans
      enum:
        - leadership_hire
        - job_posting
        - exec_post
        - funding
        - regulation
        - earnings
        - expansion
        - ma
        - hiring_spike
        - product_launch

    AccountSignal:
      type: object
      required:
        - id
        - type
        - tier
        - headline
        - summary
        - whyItMatters
        - sourceUrl
        - sourceTitle
        - scannedAt
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/AccountSignalType"
        tier:
          type: integer
          enum: [1, 2]
        headline:
          type: string
        summary:
          type: string
        whyItMatters:
          type: string
        sourceUrl:
          type: string
        sourceTitle:
          type: string
        occurredAt:
          type: ["string", "null"]
          description: ISO date when the event happened, if extractable
        scannedAt:
          type: string
          description: ISO date when the scan ran

    ScanAccountSignalsInput:
      type: object
      required:
        - company
        - yourCompany
      properties:
        company:
          type: string
        brief:
          $ref: "#/components/schemas/AccountBrief"
        yourCompany:
          $ref: "#/components/schemas/YourCompany"
        sectorPackOverride:
          type: string
          description: Optional sector pack id override — same pattern as Reasoning page

    ScanAccountSignalsResponse:
      type: object
      required:
        - signals
        - scannedAt
        - sectorPackUsed
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/AccountSignal"
        scannedAt:
          type: string
        sectorPackUsed:
          type: string

    SignalOpenerInput:
      type: object
      required:
        - signal
        - yourCompany
      properties:
        signal:
          $ref: "#/components/schemas/AccountSignal"
        brief:
          $ref: "#/components/schemas/AccountBrief"
        yourCompany:
          $ref: "#/components/schemas/YourCompany"
        tone:
          $ref: "#/components/schemas/EmailTone"

    SignalOpenerResponse:
      type: object
      required:
        - opener
        - generatedAt
      properties:
        opener:
          type: string
        generatedAt:
          type: string

    SignalUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        companyName:
          type: string
        companyDomain:
          type: string
        icpName:
          type: string
        icpId:
          type: integer
        reviewed:
          type: boolean

    BriefSourceType:
      type: string
      enum:
        - web
        - linkedin
        - asic
        - abn
        - seek_job
        - crunchbase
        - industry_press
        - builtwith
        - g2
        - asx_filing
        - mfaa
        - own_intel
        - assumed

    BriefSourceConfidence:
      type: string
      enum:
        - verified
        - informed
        - assumed

    BriefSource:
      type: object
      required:
        - type
        - label
        - detail
        - confidence
      properties:
        type:
          $ref: "#/components/schemas/BriefSourceType"
        label:
          type: string
        detail:
          type: string
        url:
          type: string
        confidence:
          $ref: "#/components/schemas/BriefSourceConfidence"

    LinkedInPost:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
        content:
          type: string

    DealSize:
      type: string
      enum: [smb, mid-market, enterprise]
      description: Deal size motion — SMB, mid-market, or enterprise

    YourCompany:
      type: object
      description: Seller profile stored client-side; sent per request for prompt context
      required:
        - companyName
        - oneLineDescription
        - industryServed
        - geographies
        - dealSize
        - buyerTitles
        - painPointsSolved
      properties:
        companyName:
          type: string
          description: Seller company name, e.g. "Optalitix"
        oneLineDescription:
          type: string
          description: What we sell, in one sentence
        industryServed:
          type: string
          description: Industry or vertical our customers operate in
        geographies:
          type: array
          items:
            type: string
          description: Markets we sell into, e.g. ["UK"], ["AU", "NZ"]
        dealSize:
          type: array
          items:
            $ref: "#/components/schemas/DealSize"
          minItems: 1
          uniqueItems: true
          description: Typical deal size motions the seller sells into — tick all that apply
        buyerTitles:
          type: array
          items:
            type: string
          description: Typical decision-maker job titles
        painPointsSolved:
          type: array
          items:
            type: string
          description: Pain points our product addresses
        whatYouSell:
          type: string
          description: Legacy field — mirrors oneLineDescription when present
        whoYouSellTo:
          type: string
          description: Legacy field — mirrors industryServed and geographies when present
        painPoints:
          type: string
          description: Legacy field — newline-joined painPointsSolved when present
        customerOutcomes:
          type: string
          description: Optional customer outcomes the AE can cite in outreach
        whyNowPattern:
          type: string
          description: Patterns that make accounts worth calling now for this seller
        reasoningOverrides:
          type: string
          description: Free-text reasoning rules appended to the system prompt
        sectorPackOverride:
          type: string
          description: Sector pack id to use instead of auto-detect; omit or empty for automatic matching

    SectorPackOption:
      type: object
      required:
        - id
        - name
        - version
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: integer
        geographies:
          type: array
          items:
            type: string

    SectorPackSelectionMeta:
      type: object
      required:
        - mode
        - matchScore
        - matchedKeywords
      properties:
        mode:
          type: string
          enum: [auto, override, legacy]
        packId:
          type: string
          nullable: true
        packName:
          type: string
          nullable: true
        autoDetectedId:
          type: string
          nullable: true
          description: Auto-detected pack id when override is set
        autoDetectedName:
          type: string
          nullable: true
        matchScore:
          type: integer
        matchedKeywords:
          type: array
          items:
            type: string

    SectorPackListResponse:
      type: object
      required:
        - packs
      properties:
        packs:
          type: array
          items:
            $ref: "#/components/schemas/SectorPackOption"

    PreviewPromptInput:
      type: object
      required:
        - yourCompany
      properties:
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    PreviewPromptResponse:
      type: object
      required:
        - systemPrompt
        - sectorPackSelection
        - availablePacks
      properties:
        systemPrompt:
          type: string
        sectorPackSelection:
          $ref: "#/components/schemas/SectorPackSelectionMeta"
        researchPack:
          $ref: "#/components/schemas/ResearchPackMeta"
        availablePacks:
          type: array
          items:
            $ref: "#/components/schemas/SectorPackOption"

    EmailTone:
      type: string
      enum: [formal, direct, conversational]

    BriefActionInput:
      type: object
      required:
        - companyName
        - brief
      properties:
        companyName:
          type: string
        brief:
          $ref: "#/components/schemas/AccountBrief"
        linkedinPosts:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInPost"
        ownIntel:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ColdEmailRegenerateInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - emailTone
          properties:
            emailTone:
              $ref: "#/components/schemas/EmailTone"

    AccountBriefColdEmail:
      type: object
      required:
        - opener
      properties:
        opener:
          type: string
        fullEmail:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    NextTouchInput:
      type: object
      required:
        - brief
        - reply
        - yourCompany
      properties:
        brief:
          $ref: "#/components/schemas/AccountBrief"
        reply:
          type: string
          description: The prospect's reply text, pasted by the AE
        yourCompany:
          $ref: "#/components/schemas/YourCompany"
        tone:
          $ref: "#/components/schemas/EmailTone"

    NextTouchResponse:
      type: object
      required:
        - opener
        - suggestion
        - generatedAt
      properties:
        opener:
          type: string
          description: Regenerated opener responding to the reply
        suggestion:
          type: string
          description: Short coaching note on what to do next
        generatedAt:
          type: string
          format: date-time

    TalkTrack:
      type: object
      required:
        - opening
        - discoveryQuestions
      properties:
        opening:
          type: string
          description: One sentence call opener
        discoveryQuestions:
          type: array
          maxItems: 5
          items:
            type: string
            description: Short open-ended question, no fluff

    TalkTrackInput:
      $ref: "#/components/schemas/BriefActionInput"

    MeetingType:
      type: string
      enum: [discovery, demo, renewal]

    CallPrep:
      type: object
      required:
        - meetingType
        - whoYouAreMeeting
        - whatTheyCareAbout
        - yourAngle
        - keyQuestions
        - askForThisCall
        - openingLine
      properties:
        meetingType:
          $ref: "#/components/schemas/MeetingType"
        whoYouAreMeeting:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
        whatTheyCareAbout:
          type: array
          maxItems: 4
          items:
            type: string
        yourAngle:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
        keyQuestions:
          type: array
          maxItems: 5
          items:
            type: string
        askForThisCall:
          type: string
        openingLine:
          type: string

    CallPrepInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - meetingType
          properties:
            meetingType:
              $ref: "#/components/schemas/MeetingType"

    MarketProspectInput:
      type: object
      required:
        - description
      properties:
        description:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ProspectCompany:
      type: object
      required:
        - name
        - domain
        - reason
      properties:
        name:
          type: string
        domain:
          type: string
        reason:
          type: string
        estimatedSize:
          type: string

    MarketProspectResponse:
      type: object
      required:
        - companies
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/ProspectCompany"

    MapRegion:
      type: string
      enum:
        - europe
        - north_america
        - asia_pacific
        - latin_america
        - middle_east_africa
        - group_unallocated

    EntityParentRelationship:
      type: string
      enum:
        - subsidiary
        - branch
        - affiliate
        - division
        - joint_venture

    EntityBuyingAutonomy:
      type: string
      enum:
        - independent
        - group_gated
        - mixed
        - unknown

    EntityFitTier:
      type: string
      enum:
        - strong
        - moderate
        - skip

    EntityBuyer:
      type: object
      required:
        - name
        - role
        - sourceUrl
        - sourceTitle
      properties:
        name:
          type: string
        role:
          type: string
        sourceUrl:
          type: string
        sourceTitle:
          type: string
