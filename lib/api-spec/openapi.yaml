      properties:
        companySnapshot:
          type: object
          required:
            - size
            - industry
            - location
            - fundingStage
          properties:
            size:
              type: string
            industry:
              type: string
            location:
              type: string
            fundingStage:
              type: string
            abn:
              type: string
            techStack:
              type: string
            possiblePainPoints:
              type: array
              description: Likely operational pains inferred from research (job ads, press, positioning)
              items:
                type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        icpFitScore:
          type: object
          required:
            - score
          properties:
            score:
              type: integer
            reason:
              type: string
              description: Legacy one-liner; prefer highlights when present
            highlights:
              type: array
              description: 2-3 concise bullets on why this account fits (or does not)
              items:
                type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        buyingCommittee:
          type: array
          items:
            $ref: "#/components/schemas/BuyingCommitteeMember"
        theirWorld:
          type: object
          required:
            - confidence
          properties:
            narrative:
              type: string
              description: Legacy prose summary; prefer bullets when present
            bullets:
