openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GTM Intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: icps
    description: Ideal Customer Profiles
  - name: signals
    description: Automated ICP signal radar
  - name: dashboard
    description: Dashboard summaries
  - name: account-brief
    description: AI-powered account brief generation

paths:
  /account-brief:
    post:
      operationId: generateAccountBrief
      tags: [account-brief]
      summary: Generate an AI-powered account brief for a company URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountBriefInput"
      responses:
        "200":
          description: Generated account brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBrief"

  /account-brief/cold-email:
    post:
      operationId: regenerateColdEmail
      tags: [account-brief]
      summary: Regenerate cold email with a different tone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColdEmailRegenerateInput"
      responses:
        "200":
          description: Regenerated cold email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBriefColdEmail"

  /account-brief/talk-track:
    post:
      operationId: generateTalkTrack
      tags: [account-brief]
      summary: Generate discovery call talk track from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalkTrackInput"
      responses:
        "200":
          description: Generated talk track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalkTrack"

  /account-brief/prep:
    post:
      operationId: generateCallPrep
      tags: [account-brief]
      summary: Generate a 1-page pre-call briefing card from an existing brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallPrepInput"
      responses:
        "200":
          description: Generated call prep card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallPrep"

  /market-prospect:
    post:
      operationId: prospectMarket
      tags: [account-brief]
      summary: Find matching companies for a target market description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketProspectInput"
      responses:
        "200":
          description: Matching prospect companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketProspectResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /icps:
    get:
      operationId: listIcps
      tags: [icps]
      summary: List all ICPs
      responses:
        "200":
          description: List of ICPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Icp"
    post:
      operationId: createIcp
      tags: [icps]
      summary: Create an ICP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpInput"
      responses:
        "201":
          description: Created ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"

  /icps/{id}:
    get:
      operationId: getIcp
      tags: [icps]
      summary: Get ICP by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
        "404":
          description: Not found
    patch:
      operationId: updateIcp
      tags: [icps]
      summary: Update ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpUpdate"
      responses:
        "200":
          description: Updated ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
    delete:
      operationId: deleteIcp
      tags: [icps]
      summary: Delete ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List radar signals
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /signal-radar:
    post:
      operationId: runSignalRadar
      tags: [signals]
      summary: Scan the web for ICP-matching buying signals
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalScanInput"
      responses:
        "200":
          description: Newly discovered signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalScanResponse"
        "400":
          description: No ICPs defined or invalid request

  /signals/{id}:
    patch:
      operationId: updateSignal
      tags: [signals]
      summary: Update signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalUpdate"
      responses:
        "200":
          description: Updated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
    delete:
      operationId: deleteSignal
      tags: [signals]
      summary: Delete signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required:
        - icpCount
        - unreadSignalCount
        - recentSignals
      properties:
        icpCount:
          type: integer
        unreadSignalCount:
          type: integer
        recentSignals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"

    Icp:
      type: object
      required:
        - id
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    IcpInput:
      type: object
      required:
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    IcpUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    Signal:
      type: object
      required:
        - id
        - title
        - type
        - source
        - importance
        - reviewed
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        companyName:
          type: ["string", "null"]
        companyDomain:
          type: ["string", "null"]
        icpName:
          type: ["string", "null"]
        icpId:
          type: ["integer", "null"]
        reviewed:
          type: boolean
        createdAt:
          type: string

    SignalScanInput:
      type: object
      properties:
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    SignalScanResponse:
      type: object
      required:
        - signals
        - added
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        added:
          type: integer

    SignalUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        companyName:
          type: string
        companyDomain:
          type: string
        icpName:
          type: string
        icpId:
          type: integer
        reviewed:
          type: boolean

    BriefSourceType:
      type: string
      enum:
        - web
        - linkedin
        - asic
        - abn
        - seek_job
        - crunchbase
        - industry_press
        - builtwith
        - g2
        - asx_filing
        - mfaa
        - own_intel
        - assumed

    BriefSourceConfidence:
      type: string
      enum:
        - verified
        - informed
        - assumed

    BriefSource:
      type: object
      required:
        - type
        - label
        - detail
        - confidence
      properties:
        type:
          $ref: "#/components/schemas/BriefSourceType"
        label:
          type: string
        detail:
          type: string
        url:
          type: string
        confidence:
          $ref: "#/components/schemas/BriefSourceConfidence"

    LinkedInPost:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
        content:
          type: string

    DealSize:
      type: string
      enum: [smb, mid-market, enterprise]
      description: Typical deal size motion — SMB, mid-market, or enterprise

    YourCompany:
      type: object
      description: Seller profile stored client-side; sent per request for prompt context
      required:
        - companyName
        - oneLineDescription
        - industryServed
        - geographies
        - dealSize
        - buyerTitles
        - painPointsSolved
      properties:
        companyName:
          type: string
          description: Seller company name, e.g. "Optalitix"
        oneLineDescription:
          type: string
          description: What we sell, in one sentence
        industryServed:
          type: string
          description: Industry or vertical our customers operate in
        geographies:
          type: array
          items:
            type: string
          description: Markets we sell into, e.g. ["UK"], ["AU", "NZ"]
        dealSize:
          $ref: "#/components/schemas/DealSize"
        buyerTitles:
          type: array
          items:
            type: string
          description: Typical decision-maker job titles
        painPointsSolved:
          type: array
          items:
            type: string
          description: Pain points our product addresses
        whatYouSell:
          type: string
          description: Legacy field — mirrors oneLineDescription when present
        whoYouSellTo:
          type: string
          description: Legacy field — mirrors industryServed and geographies when present
        painPoints:
          type: string
          description: Legacy field — newline-joined painPointsSolved when present
        customerOutcomes:
          type: string
          description: Optional customer outcomes the AE can cite in outreach

    EmailTone:
      type: string
      enum: [formal, direct, conversational]

    BriefActionInput:
      type: object
      required:
        - companyName
        - brief
      properties:
        companyName:
          type: string
        brief:
          $ref: "#/components/schemas/AccountBrief"
        linkedinPosts:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInPost"
        ownIntel:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ColdEmailRegenerateInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - emailTone
          properties:
            emailTone:
              $ref: "#/components/schemas/EmailTone"

    AccountBriefColdEmail:
      type: object
      required:
        - opener
      properties:
        opener:
          type: string
        fullEmail:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    TalkTrack:
      type: object
      required:
        - opening
        - discoveryQuestions
      properties:
        opening:
          type: string
          description: One sentence call opener
        discoveryQuestions:
          type: array
          maxItems: 5
          items:
            type: string
            description: Short open-ended question, no fluff

    TalkTrackInput:
      $ref: "#/components/schemas/BriefActionInput"

    MeetingType:
      type: string
      enum: [discovery, demo, renewal]

    CallPrep:
      type: object
      required:
        - meetingType
        - whoYouAreMeeting
        - whatTheyCareAbout
        - yourAngle
        - keyQuestions
        - askForThisCall
        - openingLine
      properties:
        meetingType:
          $ref: "#/components/schemas/MeetingType"
        whoYouAreMeeting:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
        whatTheyCareAbout:
          type: array
          maxItems: 4
          items:
            type: string
        yourAngle:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
        keyQuestions:
          type: array
          maxItems: 5
          items:
            type: string
        askForThisCall:
          type: string
        openingLine:
          type: string

    CallPrepInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - meetingType
          properties:
            meetingType:
              $ref: "#/components/schemas/MeetingType"

    MarketProspectInput:
      type: object
      required:
        - description
      properties:
        description:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ProspectCompany:
      type: object
      required:
        - name
        - domain
        - reason
      properties:
        name:
          type: string
        domain:
          type: string
        reason:
          type: string
        estimatedSize:
          type: string

    MarketProspectResponse:
      type: object
      required:
        - companies
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/ProspectCompany"

    AccountBriefInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        linkedinPosts:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInPost"
        ownIntel:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"
        emailTone:
          $ref: "#/components/schemas/EmailTone"

    CallPriority:
      type: string
      enum: [hot, warm, watch, skip]

    CallDecision:
      type: object
      required:
        - priority
        - justification
      properties:
        priority:
          $ref: "#/components/schemas/CallPriority"
        justification:
          type: string
          description: One sentence — why call (or not) this week
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    DiscoveryQuestion:
      type: object
      required:
        - question
      properties:
        question:
          type: string
        tiedToSignal:
          type: string
          description: The specific research finding this question references
        confidence:
          $ref: "#/components/schemas/BriefSourceConfidence"

    ManualResearchTip:
      type: object
      required:
        - tip
      properties:
        tip:
          type: string
        reason:
          type: string

    BuyingRole:
      type: string
      enum: [decision_maker, champion, economic_buyer, technical, influencer]
      description: Optional role in the buying process when inferrable from research

    BuyingCommitteeMember:
      type: object
      required:
        - title
        - painPoint
      properties:
        name:
          type: string
          description: Person's name when found in research; omit if unknown
        title:
          type: string
        buyingRole:
          $ref: "#/components/schemas/BuyingRole"
        painPoint:
          type: string
        linkedinSignal:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    AccountBriefRecentTriggerItem:
      type: object
      required:
        - event
        - significance
        - recency
      properties:
        event:
          type: string
        significance:
          type: string
        recency:
          type: string

    ResearchPackMeta:
      type: object
      required:
        - id
        - name
        - version
        - loadingLabel
        - expectedSeconds
      properties:
        id:
          type: string
          description: Sector pack identifier, e.g. uk-dental
        name:
          type: string
        version:
          type: integer
        lastReviewed:
          type: string
        loadingLabel:
          type: string
        expectedSeconds:
          type: integer

    AccountBrief:
      type: object
      required:
        - companySnapshot
        - icpFitScore
        - buyingCommittee
        - theirWorld
        - recentTriggers
        - coldEmail
      properties:
        companySnapshot:
          type: object
          required:
            - size
            - industry
            - location
            - fundingStage
          properties:
            size:
              type: string
            industry:
              type: string
            location:
              type: string
            fundingStage:
              type: string
            abn:
              type: string
            techStack:
              type: string
            possiblePainPoints:
              type: array
              description: Likely operational pains inferred from research (job ads, press, positioning)
              items:
                type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        icpFitScore:
          type: object
          required:
            - score
          properties:
            score:
              type: integer
            reason:
              type: string
              description: Legacy one-liner; prefer highlights when present
            highlights:
              type: array
              description: 2-3 concise bullets on why this account fits (or does not)
              items:
                type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        buyingCommittee:
          type: array
          items:
            $ref: "#/components/schemas/BuyingCommitteeMember"
        theirWorld:
          type: object
          required:
            - confidence
          properties:
            narrative:
              type: string
              description: Legacy prose summary; prefer bullets when present
            bullets:
              type: array
              description: 3-4 tight bullets on pressures, priorities, and why they might buy now
              items:
                type: string
            confidence:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        recentTriggers:
          type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/AccountBriefRecentTriggerItem"
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        coldEmail:
          type: object
          required:
            - opener
          properties:
            opener:
              type: string
            fullEmail:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        callDecision:
          $ref: "#/components/schemas/CallDecision"
          description: Should this account be called this week, and why
        discoveryQuestions:
          type: array
          description: Up to 3 discovery questions tied to specific found signals
          items:
            $ref: "#/components/schemas/DiscoveryQuestion"
        manualResearchTips:
          type: array
          description: Sources the AE should check manually before calling
          items:
            $ref: "#/components/schemas/ManualResearchTip"
        sourceSummary:
          type: object
          required:
            - totalSources
            - sourceTypes
            - australianSources
            - overallConfidence
            - confidenceReason
          properties:
            totalSources:
              type: integer
            sourceTypes:
              type: array
              items:
                type: string
            australianSources:
              type: integer
            overallConfidence:
              type: string
            confidenceReason:
              type: string
        researchPack:
          $ref: "#/components/schemas/ResearchPackMeta"
          description: Sector reasoning pack used to generate this brief
