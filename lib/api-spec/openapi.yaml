openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GTM Intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: competitors
    description: Competitor tracking
  - name: icps
    description: Ideal Customer Profiles
  - name: signals
    description: Market signals and intel
  - name: dashboard
    description: Dashboard summaries
  - name: account-brief
    description: AI-powered account brief generation

paths:
  /account-brief:
    post:
      operationId: generateAccountBrief
      tags: [account-brief]
      summary: Generate an AI-powered account brief for a company URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountBriefInput"
      responses:
        "200":
          description: Generated account brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBrief"

  /account-brief/cold-email:
    post:
      operationId: regenerateColdEmail
      tags: [account-brief]
      summary: Regenerate cold email with a different tone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColdEmailRegenerateInput"
      responses:
        "200":
          description: Regenerated cold email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBriefColdEmail"

  /account-brief/talk-track:
    post:
      operationId: generateTalkTrack
      tags: [account-brief]
      summary: Generate discovery call talk track from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalkTrackInput"
      responses:
        "200":
          description: Generated talk track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalkTrack"

  /account-brief/prep:
    post:
      operationId: generateCallPrep
      tags: [account-brief]
      summary: Generate a 1-page pre-call briefing card from an existing brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallPrepInput"
      responses:
        "200":
          description: Generated call prep card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallPrep"

  /market-prospect:
    post:
      operationId: prospectMarket
      tags: [account-brief]
      summary: Find matching companies for a target market description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketProspectInput"
      responses:
        "200":
          description: Matching prospect companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketProspectResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /competitors:
    get:
      operationId: listCompetitors
      tags: [competitors]
      summary: List all competitors
      responses:
        "200":
          description: List of competitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competitor"
    post:
      operationId: createCompetitor
      tags: [competitors]
      summary: Create a competitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetitorInput"
      responses:
        "201":
          description: Created competitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"

  /competitors/{id}:
    get:
      operationId: getCompetitor
      tags: [competitors]
      summary: Get competitor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Competitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"
        "404":
          description: Not found
    patch:
      operationId: updateCompetitor
      tags: [competitors]
      summary: Update competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetitorUpdate"
      responses:
        "200":
          description: Updated competitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"
    delete:
      operationId: deleteCompetitor
      tags: [competitors]
      summary: Delete competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /icps:
    get:
      operationId: listIcps
      tags: [icps]
      summary: List all ICPs
      responses:
        "200":
          description: List of ICPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Icp"
    post:
      operationId: createIcp
      tags: [icps]
      summary: Create an ICP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpInput"
      responses:
        "201":
          description: Created ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"

  /icps/{id}:
    get:
      operationId: getIcp
      tags: [icps]
      summary: Get ICP by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
        "404":
          description: Not found
    patch:
      operationId: updateIcp
      tags: [icps]
      summary: Update ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IcpUpdate"
      responses:
        "200":
          description: Updated ICP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Icp"
    delete:
      operationId: deleteIcp
      tags: [icps]
      summary: Delete ICP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List market signals
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"
    post:
      operationId: createSignal
      tags: [signals]
      summary: Create a market signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalInput"
      responses:
        "201":
          description: Created signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /signals/{id}:
    patch:
      operationId: updateSignal
      tags: [signals]
      summary: Update signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalUpdate"
      responses:
        "200":
          description: Updated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
    delete:
      operationId: deleteSignal
      tags: [signals]
      summary: Delete signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required:
        - competitorCount
        - icpCount
        - signalCount
        - recentSignals
        - topCompetitors
      properties:
        competitorCount:
          type: integer
        icpCount:
          type: integer
        signalCount:
          type: integer
        recentSignals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        topCompetitors:
          type: array
          items:
            $ref: "#/components/schemas/Competitor"

    Competitor:
      type: object
      required:
        - id
        - name
        - website
        - tier
        - strengths
        - weaknesses
        - targetSegment
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        website:
          type: string
        tier:
          type: string
          enum: [primary, secondary, emerging]
        tagline:
          type: ["string", "null"]
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        targetSegment:
          type: string
        pricing:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    CompetitorInput:
      type: object
      required:
        - name
        - website
        - tier
        - strengths
        - weaknesses
        - targetSegment
      properties:
        name:
          type: string
        website:
          type: string
        tier:
          type: string
          enum: [primary, secondary, emerging]
        tagline:
          type: string
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        targetSegment:
          type: string
        pricing:
          type: string
        notes:
          type: string

    CompetitorUpdate:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
        tier:
          type: string
          enum: [primary, secondary, emerging]
        tagline:
          type: string
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        targetSegment:
          type: string
        pricing:
          type: string
        notes:
          type: string

    Icp:
      type: object
      required:
        - id
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    IcpInput:
      type: object
      required:
        - name
        - industry
        - companySize
        - painPoints
        - goals
        - channels
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    IcpUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        companySize:
          type: string
        jobTitles:
          type: array
          items:
            type: string
        painPoints:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        notes:
          type: string

    Signal:
      type: object
      required:
        - id
        - title
        - type
        - source
        - importance
        - reviewed
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        competitorId:
          type: ["integer", "null"]
        competitorName:
          type: ["string", "null"]
        reviewed:
          type: boolean
        createdAt:
          type: string

    SignalInput:
      type: object
      required:
        - title
        - type
        - source
        - importance
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        competitorId:
          type: integer
        competitorName:
          type: string

    SignalUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pricing_change, product_launch, funding, hiring, partnership, other]
        source:
          type: string
        importance:
          type: string
          enum: [high, medium, low]
        competitorId:
          type: integer
        competitorName:
          type: string
        reviewed:
          type: boolean

    BriefSourceType:
      type: string
      enum:
        - web
        - linkedin
        - asic
        - abn
        - seek_job
        - crunchbase
        - industry_press
        - builtwith
        - g2
        - asx_filing
        - mfaa
        - own_intel
        - assumed

    BriefSourceConfidence:
      type: string
      enum:
        - verified
        - informed
        - assumed

    BriefSource:
      type: object
      required:
        - type
        - label
        - detail
        - confidence
      properties:
        type:
          $ref: "#/components/schemas/BriefSourceType"
        label:
          type: string
        detail:
          type: string
        url:
          type: string
        confidence:
          $ref: "#/components/schemas/BriefSourceConfidence"

    LinkedInPost:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
        content:
          type: string

    YourCompany:
      type: object
      properties:
        companyName:
          type: string
        whatYouSell:
          type: string
        whoYouSellTo:
          type: string
        painPoints:
          type: string
        customerOutcomes:
          type: string

    EmailTone:
      type: string
      enum: [formal, direct, conversational]

    BriefActionInput:
      type: object
      required:
        - companyName
        - brief
      properties:
        companyName:
          type: string
        brief:
          $ref: "#/components/schemas/AccountBrief"
        linkedinPosts:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInPost"
        ownIntel:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ColdEmailRegenerateInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - emailTone
          properties:
            emailTone:
              $ref: "#/components/schemas/EmailTone"

    AccountBriefColdEmail:
      type: object
      required:
        - opener
      properties:
        opener:
          type: string
        fullEmail:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    TalkTrack:
      type: object
      required:
        - opening
        - discoveryQuestions
      properties:
        opening:
          type: string
        discoveryQuestions:
          type: array
          items:
            type: string

    TalkTrackInput:
      $ref: "#/components/schemas/BriefActionInput"

    MeetingType:
      type: string
      enum: [discovery, demo, renewal]

    CallPrep:
      type: object
      required:
        - meetingType
        - whoYouAreMeeting
        - whatTheyCareAbout
        - yourAngle
        - keyQuestions
        - askForThisCall
        - openingLine
      properties:
        meetingType:
          $ref: "#/components/schemas/MeetingType"
        whoYouAreMeeting:
          type: string
        whatTheyCareAbout:
          type: array
          items:
            type: string
        yourAngle:
          type: string
        keyQuestions:
          type: array
          items:
            type: string
        askForThisCall:
          type: string
        openingLine:
          type: string

    CallPrepInput:
      allOf:
        - $ref: "#/components/schemas/BriefActionInput"
        - type: object
          required:
            - meetingType
          properties:
            meetingType:
              $ref: "#/components/schemas/MeetingType"

    MarketProspectInput:
      type: object
      required:
        - description
      properties:
        description:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"

    ProspectCompany:
      type: object
      required:
        - name
        - domain
        - reason
      properties:
        name:
          type: string
        domain:
          type: string
        reason:
          type: string
        estimatedSize:
          type: string

    MarketProspectResponse:
      type: object
      required:
        - companies
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/ProspectCompany"

    AccountBriefInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        linkedinPosts:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInPost"
        ownIntel:
          type: string
        yourCompany:
          $ref: "#/components/schemas/YourCompany"
        emailTone:
          $ref: "#/components/schemas/EmailTone"

    BuyingCommitteeMember:
      type: object
      required:
        - title
        - painPoint
      properties:
        title:
          type: string
        painPoint:
          type: string
        linkedinSignal:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefSource"

    AccountBriefRecentTriggerItem:
      type: object
      required:
        - event
        - significance
        - recency
      properties:
        event:
          type: string
        significance:
          type: string
        recency:
          type: string

    AccountBrief:
      type: object
      required:
        - companySnapshot
        - icpFitScore
        - buyingCommittee
        - theirWorld
        - recentTriggers
        - coldEmail
      properties:
        companySnapshot:
          type: object
          required:
            - size
            - industry
            - location
            - fundingStage
          properties:
            size:
              type: string
            industry:
              type: string
            location:
              type: string
            fundingStage:
              type: string
            abn:
              type: string
            techStack:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        icpFitScore:
          type: object
          required:
            - score
            - reason
          properties:
            score:
              type: integer
            reason:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        buyingCommittee:
          type: array
          items:
            $ref: "#/components/schemas/BuyingCommitteeMember"
        theirWorld:
          type: object
          required:
            - narrative
            - confidence
          properties:
            narrative:
              type: string
            confidence:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        recentTriggers:
          type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/AccountBriefRecentTriggerItem"
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        coldEmail:
          type: object
          required:
            - opener
          properties:
            opener:
              type: string
            fullEmail:
              type: string
            sources:
              type: array
              items:
                $ref: "#/components/schemas/BriefSource"
        sourceSummary:
          type: object
          required:
            - totalSources
            - sourceTypes
            - australianSources
            - overallConfidence
            - confidenceReason
          properties:
            totalSources:
              type: integer
            sourceTypes:
              type: array
              items:
                type: string
            australianSources:
              type: integer
            overallConfidence:
              type: string
            confidenceReason:
              type: string
